packaging_format = 2
id = "solifloute"
name = "Solifloute"
description.en = "Isomorphic video and photo blurring system made by the French student union Solidaires Étudiant-e-s"
description.fr = "Système de floutage vidéo et photo isomorphe créé par le syndicat Solidaires Étudiant-e-s"

version = "1~ynh3"

maintainers = ["ebanDev"]


[upstream]
license = "AGPL-3.0"
code = "https://github.com/Solidaires-Etudiant-e-s/Solifloute"

[integration]
yunohost = ">= 11.1"
helpers_version = "2.1"
architectures = "all"
multi_instance = false
disk = "100M"
ram.build = "1G"
ram.runtime = "512M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]
    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/Solidaires-Etudiant-e-s/Solifloute/archive/refs/tags/v1.zip"
    sha256 = "6ae6e73535f80ded6001e764638ca940b688f971542c2b9381b06edc21e546e6"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.ports]

    [resources.permissions]
    main.url = "/"
    main.allowed = "visitors"

    [resources.nodejs]
    version = "22"

    [resources.data_dir]
